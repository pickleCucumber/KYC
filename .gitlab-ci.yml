stages:
  - build
  - deploy

variables:
  DOCKER_IMAGE: doc_detector
  CONTAINER_NAME: doc_detector
  
build-test:
  stage: build
  before_script:
    - cp /home/gitlab-runner/secrets/.env .env
  script:
    - docker build -t $DOCKER_IMAGE .
  tags:
    - 117-doc_detector-test
  only:
    - test

deploy-test:
  stage: deploy
  script:
    - docker stop $CONTAINER_NAME || true
    - docker rm $CONTAINER_NAME || true
    - docker run -d -e ENVIRONMENT=development --name $CONTAINER_NAME -p 8000:8000 $DOCKER_IMAGE
    - echo "OK"
  tags:
    - 117-doc_detector-test
  only:
    - test

build-prod:
  stage: build
  before_script:
    - cp /home/gitlab-runner/secrets/.env .env
  script:
    - docker build -t $DOCKER_IMAGE .
  tags:
    - 118-doc_detector-prod
  only:
    - main

deploy-prod:
  stage: deploy
  script:
    - docker stop $CONTAINER_NAME || true
    - docker rm $CONTAINER_NAME || true
    - docker run -d --name $CONTAINER_NAME -p 8000:8000 $DOCKER_IMAGE
    - echo "OK"
  tags:
    - 118-doc_detector-prod
  only:
    - main
